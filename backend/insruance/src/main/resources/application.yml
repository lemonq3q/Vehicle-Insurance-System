spring:
  application:
    name: InsuranceSystem
  datasource:
    druid:
      url: jdbc:mysql://localhost:3306/insurance_saas?characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      username: root
      password: 20040619Lmy
      driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true  # 自动转换驼峰命名

server:
  port: 8080

security:
  session:
    # 车险会话在 Redis 中的完整 Key 格式：insurance:login:{userId}
    key-prefix: ${INSURANCE_LOGIN_KEY_PREFIX:insurance:login:}

insurance:
  tenant-isolation:
    enabled: true
  sso:
    # 车险后端使用的 SaaS 后端内部授权码兑换地址。
    saas-exchange-url: ${SAAS_SSO_EXCHANGE_URL:http://localhost:8081/internal/sso/exchange}
    # 必须与 SaaS 服务器的 INSURANCE_SSO_CLIENT_SECRET 一致。
    client-secret: ${INSURANCE_SSO_CLIENT_SECRET:change-me-in-production}

