server {
    listen 80;
    listen [::]:80;
    server_name 47.97.126.52;

    # 确认路径正确
    root /var/www/insurance-web/dist;
    index index.html;

    # 核心：History模式兜底 + 禁止目录跳转
    location / {
        try_files $uri $uri/ /index.html;
        # 临时关闭缓存，避免缓存干扰排查
        add_header Cache-Control "no-cache" always;
    }

    # 静态资源直接访问，404则返回（避免走index.html）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1d;
    }

    # 日志（便于排查）
    access_log /var/log/nginx/insurance-web-access.log;
    error_log /var/log/nginx/insurance-web-error.log;
}
